<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glassmorphism Calculator</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="calculator-container">
        <div class="calculator">
            <div class="display">
                <div id="history-display" class="history-text"></div>
                <div id="result-display" class="result-text">0</div>
            </div>
            
            <div class="buttons">
                <button class="btn advanced" onclick="clearDisplay()">C</button>
                <button class="btn advanced" onclick="deleteDigit()">⌫</button>
                <button class="btn advanced" onclick="applyAdvanced('percent')">%</button>
                <button class="btn operator" onclick="appendOperator('/')">÷</button>
                
                <button class="btn advanced" onclick="applyAdvanced('sqrt')">√</button>
                <button class="btn advanced" onclick="applyAdvanced('square')">x²</button>
                <button class="btn advanced" onclick="toggleHistory()">H</button>
                <button class="btn operator" onclick="appendOperator('*')">×</button>
                
                <button class="btn number" onclick="appendNumber('7')">7</button>
                <button class="btn number" onclick="appendNumber('8')">8</button>
                <button class="btn number" onclick="appendNumber('9')">9</button>
                <button class="btn operator" onclick="appendOperator('-')">-</button>
                
                <button class="btn number" onclick="appendNumber('4')">4</button>
                <button class="btn number" onclick="appendNumber('5')">5</button>
                <button class="btn number" onclick="appendNumber('6')">6</button>
                <button class="btn operator" onclick="appendOperator('+')">+</button>
                
                <button class="btn number" onclick="appendNumber('1')">1</button>
                <button class="btn number" onclick="appendNumber('2')">2</button>
                <button class="btn number" onclick="appendNumber('3')">3</button>
                <button class="btn equals" onclick="calculateResult()">=</button>
                
                <button class="btn number double" onclick="appendNumber('0')">0</button>
                <button class="btn number" onclick="appendNumber('.')">.</button>
            </div>
        </div>
        
        <div id="history-panel" class="history-panel">
            <div class="history-header">
                <h3>Calculation History</h3>
                <button class="close-btn" onclick="toggleHistory()">×</button>
            </div>
            <div id="history-list" class="history-list">
                <p class="empty-msg">No history yet.</p>
            </div>
            <button class="clear-history-btn" onclick="clearHistory()">Clear History</button>
        </div>
    </div>

    <audio id="click-sound" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YV92T18AAAAA"></audio>

    <script src="static/script.js"></script>
</body>
</html>
